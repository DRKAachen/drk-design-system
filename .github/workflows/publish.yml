# Publish DRK packages to npm from an explicit trigger.
# Version bumps are done intentionally in git before triggering this workflow.
# Each publish step tolerates "already published" errors so partial re-runs succeed.
name: Publish to npm

on:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Type check root package
        run: npm run typecheck

      - name: Type check workspace packages
        run: npm run typecheck:workspaces

      - name: Test root package
        run: npm run test

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Publish UI package
        run: |
          OUTPUT=$(npm publish --provenance 2>&1) && echo "$OUTPUT" || {
            if echo "$OUTPUT" | grep -q "cannot publish over the previously published"; then
              echo "::warning::@drkaachen/design-system-ui version already published — skipping"
            else
              echo "$OUTPUT" >&2
              exit 1
            fi
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish content-sanity package
        run: |
          OUTPUT=$(npm publish -w @drkaachen/content-sanity --provenance 2>&1) && echo "$OUTPUT" || {
            if echo "$OUTPUT" | grep -q "cannot publish over the previously published"; then
              echo "::warning::@drkaachen/content-sanity version already published — skipping"
            else
              echo "$OUTPUT" >&2
              exit 1
            fi
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish next-site-runtime package
        run: |
          OUTPUT=$(npm publish -w @drkaachen/next-site-runtime --provenance 2>&1) && echo "$OUTPUT" || {
            if echo "$OUTPUT" | grep -q "cannot publish over the previously published"; then
              echo "::warning::@drkaachen/next-site-runtime version already published — skipping"
            else
              echo "$OUTPUT" >&2
              exit 1
            fi
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
