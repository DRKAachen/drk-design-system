# Publish DRK packages to npm from an explicit trigger.
# Version bumps are done intentionally in git before triggering this workflow.
name: Publish to npm

on:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Type check root package
        run: npm run typecheck

      - name: Type check workspace packages
        run: npm run typecheck:workspaces

      - name: Test root package
        run: npm run test

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Publish UI package
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish content-sanity package
        run: npm publish -w @drkaachen/content-sanity --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish next-site-runtime package
        run: npm publish -w @drkaachen/next-site-runtime --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
